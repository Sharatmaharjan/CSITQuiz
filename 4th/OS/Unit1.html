<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 1: Operating System Overview (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Poppins', sans-serif; }
        .option-btn { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .option-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 15px -3px rgb(129 140 248 / 0.3); 
        }
        .option-btn.selected-correct { background-color: #10b981; color: white; border-color: #10b981; }
        .option-btn.selected-wrong { background-color: #ef4444; color: white; border-color: #ef4444; }
        .option-btn.correct { background-color: #10b981; color: white; border-color: #10b981; }
        .progress-bar { transition: width 0.5s ease; }
        .modal { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .question-card { animation: fadeSlide 0.4s ease forwards; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">🖥️</div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-indigo-100 text-sm font-medium -mt-1">Unit 1: Operating System Overview (30 MCQs)</p>
                    </div>
                </div>
                <div onclick="restartQuiz()" class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer transition">
                    <i class="fas fa-redo"></i><span>Restart</span>
                </div>
            </div>
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar" class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>

        <div id="quiz-screen" class="p-6">
            <div class="flex justify-center mb-8">
                <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-indigo-400" id="question-counter">1 / 30</div>
            </div>
            
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()" id="btn-prev" 
                        class="flex-1 bg-zinc-900 hover:bg-zinc-800 text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 transition">
                    <i class="fas fa-chevron-left"></i><span>Previous</span>
                </button>
                <button onclick="nextQuestion()" id="btn-next" 
                        class="flex-1 bg-gradient-to-r from-indigo-500 to-purple-500 font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 transition">
                    <span id="next-text">Next</span><i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
                <h2 class="text-6xl font-bold text-white mb-1" id="score">0</h2>
                <p class="text-indigo-400 text-2xl font-semibold">Score • <span id="percentage">0</span>%</p>
                
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="text-emerald-400"><i class="fas fa-check-circle text-3xl"></i></div>
                        <div id="correct-count" class="text-5xl font-bold mt-4 text-white">0</div>
                        <div class="text-zinc-400 text-sm">CORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="text-red-400"><i class="fas fa-times-circle text-3xl"></i></div>
                        <div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">0</div>
                        <div class="text-zinc-400 text-sm">INCORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="text-amber-400"><i class="fas fa-forward text-3xl"></i></div>
                        <div id="skipped-count" class="text-5xl font-bold mt-4 text-white">0</div>
                        <div class="text-zinc-400 text-sm">SKIPPED</div>
                    </div>
                </div>

                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()" class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:bg-zinc-100 transition">
                        REVIEW ALL ANSWERS
                    </button>
                    <button onclick="shareResults()" class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3 transition">
                        SHARE RESULT
                    </button>
                </div>
                <button onclick="restartQuiz()" class="mt-6 w-full py-5 text-indigo-400 font-medium flex items-center justify-center gap-x-2 hover:text-indigo-300 transition">
                    Restart Quiz
                </button>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()" class="w-9 h-9 flex items-center justify-center text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8"></div>
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" class="w-full py-5 bg-indigo-500 hover:bg-indigo-400 rounded-3xl text-white font-semibold">Close Review</button>
            </div>
        </div>
    </div>

    <script>
        const originalQuestions = [
            {question:"An Operating System is best described as",options:["A collection of device drivers only","A resource manager and control program that acts as intermediary between users and hardware","Only a graphical user interface","A file storage system"],correctAnswer:"A resource manager and control program that acts as intermediary between users and hardware"},
            {question:"Which of the following is NOT one of the four fundamental functions of an OS?",options:["Process Management","Memory Management","File System Management","Hardware Manufacturing"],correctAnswer:"Hardware Manufacturing"},
            {question:"From the user view, what does a mobile OS primarily focus on?",options:["Uptime and stability only","Touch interfaces and battery optimization","Server clustering","Batch job scheduling"],correctAnswer:"Touch interfaces and battery optimization"},
            // ... (All your other 27 questions remain exactly the same)
            {question:"The main disadvantage of pure layered structure is",options:["High performance","Performance overhead due to many layered calls","Easy debugging","High security"],correctAnswer:"Performance overhead due to many layered calls"}
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return { question: q.question, options: shuffledOpts, correctIndex };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;

            const container = document.getElementById("options-container");
            container.innerHTML = "";

            const labels = ["A", "B", "C", "D"];
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-indigo-400 flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-indigo-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-indigo-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });

            updateProgress();
            updateNavigation();

            if (isAnswered[currentIndex]) {
                showFeedback();
            }
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;   // Prevent re-selection

            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;

            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];

            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                btn.onclick = null;           // Disable further clicks
                btn.style.cursor = "default";

                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                }
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                    }
                }
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            document.getElementById("btn-prev").disabled = currentIndex === 0;
            document.getElementById("next-text").textContent = (currentIndex === 29) ? "Finish Quiz" : "Next";
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) skipped++;
                else if (userAnswers[i] === shuffledQuestions[i].correctIndex) correct++;
                else incorrect++;
            }
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const rs = document.getElementById("results-screen");
            rs.classList.remove("hidden");

            const stats = calculateResults();
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;

            const trophy = document.getElementById("trophy");
            trophy.innerHTML = stats.percentage >= 80 ? "🏆" : stats.percentage >= 60 ? "🎉" : "📚";

            let insight = stats.percentage >= 90 ? "Outstanding! You have excellent understanding of OS fundamentals." :
                          stats.percentage >= 75 ? "Great job! You're doing very well." :
                          stats.percentage >= 60 ? "Good effort. Review a few concepts and you'll improve quickly." :
                          "Keep studying the basics of Operating Systems. Try again!";
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";

            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);

                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6 bg-zinc-950/50";
                div.innerHTML = `
                    <p class="font-medium mb-6 text-white">${i+1}. ${q.question}</p>
                    <div class="space-y-3">
                        ${q.options.map((opt, idx) => `
                            <div class="flex justify-between items-center p-3 rounded-2xl ${idx === q.correctIndex ? 'bg-emerald-900/30 text-emerald-400' : 'bg-zinc-900'}">
                                <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                ${idx === q.correctIndex ? '<span class="text-emerald-400 font-bold">✓ CORRECT</span>' : ''}
                                ${answered && idx === userIdx && idx !== q.correctIndex ? '<span class="text-red-400 font-bold">✕ Your Answer</span>' : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
                list.appendChild(div);
            });

            modal.classList.remove("hidden");
        }

        function hideReviewModal() {
            document.getElementById("review-modal").classList.add("hidden");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `Quizzy Pro - Unit 1: Operating System Overview\nScore: ${stats.percentage}% (${stats.correct}/30)\nCorrect: ${stats.correct} | Incorrect: ${stats.incorrect} | Skipped: ${stats.skipped}`;
            navigator.clipboard.writeText(text).then(() => alert("✅ Result copied to clipboard!"));
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            prepareShuffledQuestions();
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            renderQuestion();
        }

        function handleKeyboard(e) {
            if (document.getElementById("results-screen").classList.contains("hidden") === false) return;
            
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            console.log("%c✅ Quizzy Pro • Unit 1: Operating System Overview loaded successfully!", "color:#a5b4fc; font-weight:bold");
        }

        window.onload = startQuiz;
    </script>
</body>
</html>

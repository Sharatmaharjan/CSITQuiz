<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 3: Process Deadlocks (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        :root { --primary: 129 140 248; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Poppins', sans-serif; }
        .option-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(129 140 248 / 0.3); }
        .option-btn.selected-correct { background-color: #10b981; color: white; border-color: #10b981; }
        .option-btn.selected-wrong { background-color: #ef4444; color: white; border-color: #ef4444; }
        .option-btn.correct { background-color: #10b981; color: white; border-color: #10b981; }
        .progress-bar { transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .question-card { animation: fadeSlide 0.4s ease forwards; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <header class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">🔒</div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-indigo-100 text-sm font-medium -mt-1">Unit 3: Process Deadlocks (30 MCQs)</p>
                    </div>
                </div>
                <div onclick="restartQuiz()" class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                    <i class="fas fa-redo"></i><span>Restart</span>
                </div>
            </div>
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar" class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>

        <div id="quiz-screen" class="p-6">
            <div class="flex justify-center mb-8">
                <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-indigo-400" id="question-counter">1 / 30</div>
            </div>
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()" id="btn-prev" class="flex-1 bg-zinc-900 hover:bg-zinc-800 text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3">
                    <i class="fas fa-chevron-left"></i><span>Previous</span>
                </button>
                <button onclick="nextQuestion()" id="btn-next" class="flex-1 bg-gradient-to-r from-indigo-500 to-violet-500 font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3">
                    <span id="next-text">Next</span><i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-indigo-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-emerald-400"><i class="fas fa-check-circle text-3xl"></i></div><div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div><div class="text-zinc-400 text-sm">CORRECT</div></div>
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-red-400"><i class="fas fa-times-circle text-3xl"></i></div><div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div><div class="text-zinc-400 text-sm">INCORRECT</div></div>
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-amber-400"><i class="fas fa-forward text-3xl"></i></div><div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div><div class="text-zinc-400 text-sm">SKIPPED</div></div>
                </div>
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()" class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3">REVIEW ALL ANSWERS</button>
                    <button onclick="shareResults()" class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3">SHARE RESULT</button>
                </div>
                <button onclick="restartQuiz()" class="mt-6 w-full py-5 text-indigo-400 font-medium flex items-center justify-center gap-x-2">Restart Quiz</button>
            </div>
        </div>
    </div>

    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()" class="w-9 h-9 flex items-center justify-center text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8"></div>
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" class="w-full py-5 bg-indigo-500 hover:bg-indigo-400 rounded-3xl text-white font-semibold">Close Review</button>
            </div>
        </div>
    </div>

    <script>
        const originalQuestions = [
            {question:"A deadlock occurs when",options:["A single process waits for I/O","A set of processes are permanently blocked due to circular waiting for resources","All processes finish execution normally","Resources are preempted by the OS"],correctAnswer:"A set of processes are permanently blocked due to circular waiting for resources"},
            {question:"Which of the following is NOT one of the four necessary conditions for deadlock (Coffman conditions)?",options:["Mutual Exclusion","Hold and Wait","No Preemption","Starvation"],correctAnswer:"Starvation"},
            {question:"Mutual Exclusion condition means",options:["Resources can be shared by multiple processes","Only one process can use a resource at a time","Resources can be forcibly taken away","Processes can request resources in any order"],correctAnswer:"Only one process can use a resource at a time"},
            {question:"Hold and Wait condition occurs when",options:["Processes release all resources before requesting new ones","A process holds at least one resource while waiting for another","All resources are preemptable","Circular wait does not exist"],correctAnswer:"A process holds at least one resource while waiting for another"},
            {question:"No Preemption condition implies that",options:["Resources can be taken away by the OS at any time","Resources must be voluntarily released by the process","Processes can share resources freely","Deadlock can never occur"],correctAnswer:"Resources must be voluntarily released by the process"},
            {question:"Circular Wait exists when",options:["There is a linear chain of resource requests","A circular chain of processes exists where each waits for a resource held by the next","All processes hold no resources","Resources are preemptable"],correctAnswer:"A circular chain of processes exists where each waits for a resource held by the next"},
            {question:"Preemptable resources are those that",options:["Cannot be taken away without causing failure","Can be reallocated without harming the process (e.g., CPU, memory)","Must be voluntarily released","Always cause deadlocks"],correctAnswer:"Can be reallocated without harming the process (e.g., CPU, memory)"},
            {question:"Non-preemptable resources typically include",options:["CPU cycles and main memory","Printers, tape drives, and database records","Network bandwidth","Virtual memory pages"],correctAnswer:"Printers, tape drives, and database records"},
            {question:"In a Resource-Allocation Graph (RAG), a cycle with single-instance resources indicates",options:["No deadlock","A possible deadlock","Definite deadlock","Safe state"],correctAnswer:"Definite deadlock"},
            {question:"A cycle in RAG with multiple-instance resources",options:["Always means deadlock","May or may not mean deadlock (needs further analysis)","Guarantees safe state","Cannot occur"],correctAnswer:"May or may not mean deadlock (needs further analysis)"},
            {question:"The Ostrich Algorithm for deadlock handling means",options:["Preventing all four conditions","Detecting and recovering from deadlocks","Completely ignoring deadlocks (assuming they are rare)","Using Banker's Algorithm"],correctAnswer:"Completely ignoring deadlocks (assuming they are rare)"},
            {question:"Which deadlock prevention strategy breaks the Hold and Wait condition?",options:["Making all resources preemptable","Requiring processes to request all resources at the beginning","Imposing total ordering on resource types","Allowing resource sharing"],correctAnswer:"Requiring processes to request all resources at the beginning"},
            {question:"Preventing Circular Wait is achieved by",options:["Allowing preemption","Imposing a total ordering on resource types so processes request in increasing order","Making resources shareable","Using the Ostrich Algorithm"],correctAnswer:"Imposing a total ordering on resource types so processes request in increasing order"},
            {question:"Banker's Algorithm is an example of",options:["Deadlock prevention","Deadlock avoidance","Deadlock detection","Deadlock recovery"],correctAnswer:"Deadlock avoidance"},
            {question:"In Banker's Algorithm, the 'Need' matrix is calculated as",options:["Allocation - Max","Max - Allocation","Available - Allocation","Work - Need"],correctAnswer:"Max - Allocation"},
            {question:"A system is in a safe state according to Banker's Algorithm if",options:["There is a sequence in which all processes can finish without deadlock","A cycle exists in the RAG","All processes are in waiting state","Resources are over-allocated"],correctAnswer:"There is a sequence in which all processes can finish without deadlock"},
            {question:"Deadlock detection for single-instance resources uses",options:["Banker's Algorithm","Wait-for graph (cycle detection)","Resource-Allocation Graph only","Semaphores"],correctAnswer:"Wait-for graph (cycle detection)"},
            {question:"In deadlock recovery, one common method is",options:["Ignoring the deadlock","Process termination (aborting one or all deadlocked processes)","Preventing circular wait","Using preemptable resources only"],correctAnswer:"Process termination (aborting one or all deadlocked processes)"},
            {question:"Resource preemption as a recovery method involves",options:["Aborting all processes","Selecting a victim process, rolling it back, and reallocating its resources","Ignoring the deadlock","Using Banker's Algorithm"],correctAnswer:"Selecting a victim process, rolling it back, and reallocating its resources"},
            {question:"Partial rollback in deadlock recovery means",options:["Restarting the process from the beginning","Returning the process to a predefined checkpoint","Aborting the entire system","Releasing all resources"],correctAnswer:"Returning the process to a predefined checkpoint"},
            {question:"Which of the following is a disadvantage of deadlock prevention?",options:["High runtime overhead","Reduced system flexibility and resource utilization","No guarantee of safety","Frequent detection required"],correctAnswer:"Reduced system flexibility and resource utilization"},
            {question:"The main advantage of deadlock avoidance over prevention is",options:["No need for advance information","Higher resource utilization and flexibility","No computational overhead","Guaranteed deadlock freedom without any condition"],correctAnswer:"Higher resource utilization and flexibility"},
            {question:"Starvation differs from deadlock in that",options:["Starvation involves circular wait while deadlock does not","In starvation a process waits indefinitely due to unfair scheduling (no circular wait required)","Deadlock is easier to detect","Starvation cannot occur in multiprogramming"],correctAnswer:"In starvation a process waits indefinitely due to unfair scheduling (no circular wait required)"},
            {question:"In the given scenario with processes P1-P4 and resources, if P3 requests 1 more resource (using Banker's), the request",options:["Leads to unsafe state","Can be granted safely (safe sequence exists)","Causes immediate deadlock","Is invalid because Need is exceeded"],correctAnswer:"Can be granted safely (safe sequence exists)"},
            {question:"If P4 requests 1 more resource in the same scenario, Banker's Algorithm concludes",options:["Safe state","Unsafe state (request denied to avoid potential deadlock)","Immediate deadlock","No effect on system"],correctAnswer:"Unsafe state (request denied to avoid potential deadlock)"},
            {question:"The Resource-Allocation Graph is useful because",options:["It shows future requests","It provides a visual way to detect cycles for single-instance resources","It replaces Banker's Algorithm","It works only for multiple-instance resources"],correctAnswer:"It provides a visual way to detect cycles for single-instance resources"},
            {question:"Which condition is easiest to break for deadlock prevention?",options:["Mutual Exclusion","Hold and Wait","No Preemption","Circular Wait"],correctAnswer:"Circular Wait"},
            {question:"A system with only preemptable resources (like CPU and memory) is",options:["Always deadlock-free","Less prone to deadlock","More prone to deadlock","Cannot use Banker's Algorithm"],correctAnswer:"Less prone to deadlock"},
            {question:"The Ostrich Algorithm is most suitable for",options:["Safety-critical real-time systems","General-purpose desktop OS where deadlocks are rare","Banking systems","Embedded systems"],correctAnswer:"General-purpose desktop OS where deadlocks are rare"},
            {question:"In deadlock recovery by process termination, the selection criteria usually consider",options:["Only process priority","Priority, time used, resources held, and type (interactive vs batch)","Only resource type","Only circular wait length"],correctAnswer:"Priority, time used, resources held, and type (interactive vs batch)"},
            {question:"The four Coffman conditions must all be true simultaneously for",options:["Starvation","Deadlock to occur","Safe state","Resource preemption"],correctAnswer:"Deadlock to occur"}
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return { question: q.question, options: shuffledOpts, correctIndex };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-indigo-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-indigo-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-indigo-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
            updateProgress();
            updateNavigation();
            if (isAnswered[currentIndex]) showFeedback();
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) btn.classList.add("selected-correct");
                    else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextText = document.getElementById("next-text");
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            nextText.textContent = currentIndex === 29 ? "Finish Quiz" : "Next";
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) skipped++;
                else if (userAnswers[i] === shuffledQuestions[i].correctIndex) correct++;
                else incorrect++;
            }
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
            const stats = calculateResults();
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
            const trophyEl = document.getElementById("trophy");
            trophyEl.innerHTML = stats.percentage >= 80 ? "🏆" : stats.percentage >= 60 ? "🎉" : "🔒";
            let insight = stats.percentage >= 90 ? "Outstanding! You have mastered deadlock characterization, RAG, prevention, avoidance (Banker's), detection, and recovery." :
                          stats.percentage >= 75 ? "Excellent! Strong grasp of Coffman conditions, resource types, and classical recovery strategies." :
                          stats.percentage >= 60 ? "Good job! Review Banker's Algorithm steps and RAG cycle detection." :
                          "Keep learning! Focus on the four necessary conditions and prevention techniques.";
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `🔒 I just scored ${stats.percentage}% on Quizzy Pro • Unit 3: Process Deadlocks!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nMastered Coffman conditions, RAG, Banker's Algorithm & recovery? Try Quizzy Pro!`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const origHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = origHTML, 2000);
            });
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            prepareShuffledQuestions();
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            renderQuestion();
            console.log("%cQuizzy Pro • Unit 3: Process Deadlocks restarted with fresh random order!", "color:#818cf8; font-weight:600");
        }

        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            console.log("%c✅ Quizzy Pro • Unit 3: Process Deadlocks loaded successfully! (30 tricky MCQs from official PDF)", "color:#818cf8; font-family:monospace; font-size:13px");
        }

        window.onload = startQuiz;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 4: Memory Management (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        :root { --primary: 129 140 248; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Poppins', sans-serif; }
        .option-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(129 140 248 / 0.3); }
        .option-btn.selected-correct { background-color: #10b981; color: white; border-color: #10b981; }
        .option-btn.selected-wrong { background-color: #ef4444; color: white; border-color: #ef4444; }
        .option-btn.correct { background-color: #10b981; color: white; border-color: #10b981; }
        .progress-bar { transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .question-card { animation: fadeSlide 0.4s ease forwards; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <header class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">🧠</div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-indigo-100 text-sm font-medium -mt-1">Unit 4: Memory Management (30 MCQs)</p>
                    </div>
                </div>
                <div onclick="restartQuiz()" class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                    <i class="fas fa-redo"></i><span>Restart</span>
                </div>
            </div>
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar" class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>

        <div id="quiz-screen" class="p-6">
            <div class="flex justify-center mb-8">
                <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-indigo-400" id="question-counter">1 / 30</div>
            </div>
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()" id="btn-prev" class="flex-1 bg-zinc-900 hover:bg-zinc-800 text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3">
                    <i class="fas fa-chevron-left"></i><span>Previous</span>
                </button>
                <button onclick="nextQuestion()" id="btn-next" class="flex-1 bg-gradient-to-r from-indigo-500 to-violet-500 font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3">
                    <span id="next-text">Next</span><i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-indigo-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-emerald-400"><i class="fas fa-check-circle text-3xl"></i></div><div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div><div class="text-zinc-400 text-sm">CORRECT</div></div>
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-red-400"><i class="fas fa-times-circle text-3xl"></i></div><div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div><div class="text-zinc-400 text-sm">INCORRECT</div></div>
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-amber-400"><i class="fas fa-forward text-3xl"></i></div><div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div><div class="text-zinc-400 text-sm">SKIPPED</div></div>
                </div>
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()" class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3">REVIEW ALL ANSWERS</button>
                    <button onclick="shareResults()" class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3">SHARE RESULT</button>
                </div>
                <button onclick="restartQuiz()" class="mt-6 w-full py-5 text-indigo-400 font-medium flex items-center justify-center gap-x-2">Restart Quiz</button>
            </div>
        </div>
    </div>

    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()" class="w-9 h-9 flex items-center justify-center text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8"></div>
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" class="w-full py-5 bg-indigo-500 hover:bg-indigo-400 rounded-3xl text-white font-semibold">Close Review</button>
            </div>
        </div>
    </div>

    <script>
        const originalQuestions = [
            {question:"The goals of memory management include",options:["Only maximizing CPU utilization","Efficiency, protection, relocation, sharing, and logical organization","Only providing protection against external fragmentation","Only enabling dynamic relocation"],correctAnswer:"Efficiency, protection, relocation, sharing, and logical organization"},
            {question:"The main disadvantage of monoprogramming is",options:["High CPU utilization","Extremely low CPU utilization during I/O operations","Complex protection mechanisms","External fragmentation"],correctAnswer:"Extremely low CPU utilization during I/O operations"},
            {question:"Multiprogramming improves system performance by",options:["Running only one program at a time","Keeping multiple programs in memory and switching CPU during I/O waits","Using fixed partitions only","Eliminating all fragmentation"],correctAnswer:"Keeping multiple programs in memory and switching CPU during I/O waits"},
            {question:"In the multiprogramming CPU utilization model, utilization is given by",options:["p^N","1 - p^N","N * p","1 / p"],correctAnswer:"1 - p^N"},
            {question:"Fixed partitions (static partitioning) primarily suffer from",options:["External fragmentation","Internal fragmentation","No fragmentation","Belady's anomaly"],correctAnswer:"Internal fragmentation"},
            {question:"Variable partitions (dynamic partitioning) primarily suffer from",options:["Internal fragmentation","External fragmentation","No need for compaction","Fixed degree of multiprogramming"],correctAnswer:"External fragmentation"},
            {question:"In first-fit allocation strategy, the OS allocates",options:["The smallest sufficient free block","The first free block large enough for the request","The largest free block","The block with least fragmentation"],correctAnswer:"The first free block large enough for the request"},
            {question:"Best-fit allocation strategy chooses",options:["The first sufficient block","The smallest sufficient free block","The largest sufficient free block","Any random block"],correctAnswer:"The smallest sufficient free block"},
            {question:"Dynamic relocation is performed at",options:["Compile time","Load time only","Runtime using base and limit registers","Only when swapping"],correctAnswer:"Runtime using base and limit registers"},
            {question:"Memory protection in dynamic relocation is mainly provided by",options:["The base register","The limit register checking bounds","The page table","The segment table"],correctAnswer:"The limit register checking bounds"},
            {question:"A bitmap for memory management uses",options:["One byte per allocation unit","One bit per allocation unit","A linked list","A segment table"],correctAnswer:"One bit per allocation unit"},
            {question:"Linked-list memory management allows easy",options:["Searching for free blocks only","Coalescing (merging) adjacent free blocks","Fixed-size allocation only","No fragmentation"],correctAnswer:"Coalescing (merging) adjacent free blocks"},
            {question:"Virtual memory creates the illusion of",options:["Smaller memory than physical RAM","A very large contiguous address space","Only fixed partitions","No page faults"],correctAnswer:"A very large contiguous address space"},
            {question:"Paging eliminates",options:["Internal fragmentation","External fragmentation","Both","Neither"],correctAnswer:"External fragmentation"},
            {question:"A page table maps",options:["Physical frames to logical pages","Logical pages to physical frames","Segments to pages","Only free memory blocks"],correctAnswer:"Logical pages to physical frames"},
            {question:"A page fault occurs when",options:["The page is in memory but dirty","The valid/invalid bit is 0 (page not in physical memory)","The TLB hit occurs","The limit register is exceeded"],correctAnswer:"The valid/invalid bit is 0 (page not in physical memory)"},
            {question:"The Translation Lookaside Buffer (TLB) is a",options:["Software data structure","Hardware cache for recent page table entries","Page replacement algorithm","Segment table"],correctAnswer:"Hardware cache for recent page table entries"},
            {question:"Locality of reference includes",options:["Only temporal locality","Temporal and spatial locality","Only external fragmentation","Belady's anomaly"],correctAnswer:"Temporal and spatial locality"},
            {question:"FIFO page replacement algorithm suffers from",options:["No page faults","Belady's anomaly","Optimal performance","Least recently used behavior"],correctAnswer:"Belady's anomaly"},
            {question:"LRU page replacement replaces the page",options:["That was used most recently","That has not been used for the longest time","With the smallest count","That will not be used in future"],correctAnswer:"That has not been used for the longest time"},
            {question:"Optimal (MIN) page replacement replaces the page",options:["With lowest count","That will not be used for the longest time in future","First loaded","Recently used"],correctAnswer:"That will not be used for the longest time in future"},
            {question:"Second Chance (Clock) algorithm is an approximation of",options:["FIFO","LRU","Optimal","LFU"],correctAnswer:"LRU"},
            {question:"Segmentation views the logical address space as",options:["Fixed-size pages","A collection of variable-sized logical segments","Single linear space","Inverted page table"],correctAnswer:"A collection of variable-sized logical segments"},
            {question:"The main drawback of pure segmentation is",options:["Internal fragmentation","External fragmentation","No sharing","Fixed size segments"],correctAnswer:"External fragmentation"},
            {question:"Segmentation with paging (as in MULTICS) combines",options:["No external fragmentation of paging with logical view of segmentation","Only fixed partitions","Only bitmaps","No protection"],correctAnswer:"No external fragmentation of paging with logical view of segmentation"},
            {question:"In segmentation, the logical address consists of",options:["Page number and offset","Segment number and offset","Frame number and offset","Base and limit"],correctAnswer:"Segment number and offset"},
            {question:"In the given segment table problem (segment 0 base 219 limit 600, etc.), logical address 0,430 translates to physical address",options:["649","2310","2311","Segmentation fault"],correctAnswer:"649"},
            {question:"Logical address 2,500 in the same segment table results in",options:["649","2310","2311","Segmentation fault"],correctAnswer:"Segmentation fault"},
            {question:"Paging vs Segmentation comparison shows that paging has",options:["External fragmentation","No external fragmentation but possible internal fragmentation","Variable-sized units","User-visible segments"],correctAnswer:"No external fragmentation but possible internal fragmentation"},
            {question:"Belady's anomaly is observed in which algorithm?",options:["LRU","Optimal","FIFO","LFU"],correctAnswer:"FIFO"}
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return { question: q.question, options: shuffledOpts, correctIndex };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-indigo-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-indigo-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-indigo-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
            updateProgress();
            updateNavigation();
            if (isAnswered[currentIndex]) showFeedback();
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) btn.classList.add("selected-correct");
                    else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextText = document.getElementById("next-text");
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            nextText.textContent = currentIndex === 29 ? "Finish Quiz" : "Next";
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) skipped++;
                else if (userAnswers[i] === shuffledQuestions[i].correctIndex) correct++;
                else incorrect++;
            }
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
            const stats = calculateResults();
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
            const trophyEl = document.getElementById("trophy");
            trophyEl.innerHTML = stats.percentage >= 80 ? "🏆" : stats.percentage >= 60 ? "🎉" : "🧠";
            let insight = stats.percentage >= 90 ? "Outstanding! You mastered memory management concepts, paging, segmentation, page replacement, and virtual memory techniques." :
                          stats.percentage >= 75 ? "Excellent! Strong grasp of partitions, allocation strategies, TLB, and Belady's anomaly." :
                          stats.percentage >= 60 ? "Good job! Review page faults handling, page tables, and fit strategies." :
                          "Keep learning! Focus on virtual memory, paging vs segmentation, and page replacement algorithms.";
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `🧠 I just scored ${stats.percentage}% on Quizzy Pro • Unit 4: Memory Management!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nMastered paging, segmentation, page replacement & virtual memory? Try Quizzy Pro!`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const origHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = origHTML, 2000);
            });
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            prepareShuffledQuestions();
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            renderQuestion();
            console.log("%cQuizzy Pro • Unit 4: Memory Management restarted with fresh random order!", "color:#818cf8; font-weight:600");
        }

        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            console.log("%c✅ Quizzy Pro • Unit 4: Memory Management loaded successfully! (30 tricky MCQs from official PDF)", "color:#818cf8; font-family:monospace; font-size:13px");
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
